name: build

on: push

jobs:
  enforce:
    #run if push or pull_requests from fork
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    name: Maven Dependencies

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          architecture: x64
          distribution: adopt
          cache: maven

      - name: Package
        run: mvn --batch-mode --update-snapshots enforcer:enforce

  test:
    #run if push or pull_requests from fork
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    name: Tests

    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        java: [21]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          architecture: x64
          distribution: adopt
          cache: maven

      - name: Show memory
        run: |
          free -h || true
          cat /proc/meminfo | head -n 20 || true
          java -XshowSettings:vm -version
      - name: Test
        run: mvn --batch-mode --update-snapshots test -Dmatsim.preferLocalDtds=true -Dmaven.javadoc.skip -e
      - uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: target/site/jacoco/

  package:
    #run if push or pull_requests from fork
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    needs: [enforce, test]
    name: Package

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          architecture: x64
          distribution: adopt
          cache: maven

      - name: Package
        run: mvn --batch-mode --update-snapshots package -DskipTests -Dmatsim.preferLocalDtds=true -Dmaven.javadoc.skip -e
      - run: mkdir staging && cp *.jar staging
      - uses: actions/upload-artifact@v4
        with:
          name: Package
          path: staging

    env:
      MAVEN_OPTS: -Xmx16G